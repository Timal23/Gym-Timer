<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gym Timer</title>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Gym Timer" />

    <link rel="stylesheet" href="style.css" />
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="apple-touch-startup-image" href="splash.png">
  </head>

  <body>
    <div id="splash">
            <img src="splash.png" alt="Gym Timer">
            <p>Gym Timer</p>
    </div>
    <div class="carte">
      <p class="label">Temps de repos</p>
      <p class="timer">1:30</p>

      <div class="barre-fond">
        <div class="barre-remplissage" id="barre"></div>
      </div>

      <div class="ajustements">
        <button class="btn-ajust">− 15s</button>
        <button class="btn-ajust">+ 15s</button>
      </div>

      <button class="btn-go">GO</button>
      <button class="btn-reset" id="reset">↺ Recommencer</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
